kind = "web"
previewPath = "/"
title = "Nafsam"
version = "1.0.0"
id = "artifacts/nafsam"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19579

[services.development]
run = "pnpm --filter @workspace/nafsam run dev"

[services.production]
build = ["sh", "-c", "PORT=19579 BASE_PATH=/ pnpm --filter @workspace/nafsam run build && pnpm --filter @workspace/api-server run build"]
run = ["node", "--enable-source-maps", "artifacts/api-server/dist/index.mjs"]

[services.env]
PORT = "19579"
NODE_ENV = "production"
BASE_PATH = "/"
